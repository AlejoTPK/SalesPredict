services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: salespredict-db
    environment:
      POSTGRES_USER: salespredict
      POSTGRES_PASSWORD: salespredict
      POSTGRES_DB: salespredict
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init_timescaledb.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salespredict -d salespredict"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: salespredict-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: salespredict-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: salespredict-mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_TRACKING_URI: http://0.0.0.0:5000
      MLFLOW_BACKEND_STORE_URI: postgresql://salespredict:salespredict@db:5432/salespredict
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy
    command: >
      mlflow server
      --backend-store-uri postgresql://salespredict:salespredict@db:5432/salespredict
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: salespredict-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://salespredict:salespredict@db:5432/salespredict
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      mlflow:
        condition: service_started
    command: >
      poetry run uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: salespredict-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://salespredict:salespredict@db:5432/salespredict
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SECRET_KEY: dev-secret-key-change-in-production
      C_FORCE_ROOT: "true"
    volumes:
      - ../backend:/app
      - ../ml-pipelines:/ml-pipelines
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    command: >
      poetry run celery -A app.tasks worker
      --loglevel=info
      --concurrency=2

  celery-beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: salespredict-celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://salespredict:salespredict@db:5432/salespredict
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SECRET_KEY: dev-secret-key-change-in-production
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      poetry run celery -A app.tasks beat
      --loglevel=info

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: salespredict-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_started
    command: pnpm dev

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  mlflow_data:
